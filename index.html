<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yacht Week Checkout</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-logo">⛵️</span>
        <span class="brand-name">Yacht Week</span>
      </div>
      <nav class="nav">
        <a class="nav-link" href="./admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="filters" id="filters">
      <div class="filter-group">
        <label for="locationSelect">Location</label>
        <select id="locationSelect"></select>
      </div>
      <div class="filter-group">
        <label for="weekSelect">Week</label>
        <select id="weekSelect"></select>
      </div>
      <div class="filter-group">
        <label for="guestsInput">Guests</label>
        <input id="guestsInput" type="number" min="1" value="2" placeholder="Guests">
      </div>
      <div class="filter-actions">
        <button id="applyFiltersBtn" class="btn primary">Search</button>
        <button id="resetFiltersBtn" class="btn">Reset</button>
      </div>
    </section>

    <section id="results" class="results-grid"></section>
  </main>

  <div id="bookingModal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Complete your booking</h3>
        <button class="icon-btn" data-close-modal>&times;</button>
      </div>
      <div class="modal-body">
        <form id="bookingForm" class="form">
          <input type="hidden" id="bookingYachtId">
          <input type="hidden" id="bookingLocationId">
          <input type="hidden" id="bookingWeekId">

          <div class="form-row">
            <label for="customerName">Full name</label>
            <input id="customerName" type="text" required placeholder="Alex Morgan">
          </div>
          <div class="form-row">
            <label for="customerEmail">Email</label>
            <input id="customerEmail" type="email" required placeholder="alex@example.com">
          </div>
          <div class="form-row">
            <label for="customerPhone">Phone</label>
            <input id="customerPhone" type="tel" required placeholder="+1 555 123 4567">
          </div>
          <div class="form-row">
            <label for="customerNotes">Notes (optional)</label>
            <textarea id="customerNotes" rows="3" placeholder="Any special requests"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn" data-close-modal>Cancel</button>
            <button type="submit" class="btn primary">Proceed to Payment</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year"></span> Yacht Week</div>
      <div class="muted">Secure payments by Stripe</div>
    </div>
  </footer>

  <script src="./storage.js"></script>
  <script src="./app.js"></script>
</body>
</html>
